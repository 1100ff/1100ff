<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1100ff / me</title>
    <link rel="stylesheet" href="me_style.css">
</head>
<body>

    <a href="main.html" class="back-link">← back</a>

    <div class="me-container">
        
        <section class="profile-section">
            <h1 class="main-title">HELLOWS?</h1>
            
            <div class="photo-and-text">
                <div class="horizontal-photo">
                    <img src="https://i.pinimg.com/originals/5e/59/0b/5e590b4f79b8810bee7539ae44df37c3.gif" alt="me">
                </div>
                
                <div class="bio-text">
                    <p class="name">Im HURT or michel</p>
                    <p class="status">сосал</p>
                    <p class="sub-status"> </p>
                </div>
            </div>
        </section>

        <section class="interests-layout">
            
            <div class="interests-top-row">
                <div class="interests-text-left">
                    <p>сосал</p>
                </div>

                <div class="interest-item-small">
                    <div class="black-photo-box small-box">
                        <img src="https://i.pinimg.com/originals/c3/11/67/c3116790e5192591ed9dd42ce67644a0.gif" alt="kitten">
                    </div>
                    <span class="photo-caption">old and tired</span>
                </div>
            </div>

            <!-- Убрали лишние внешние div, оставив чистую структуру -->
            <div class="interest-item-big clickable-pic">
                <div class="black-photo-box big-box">
                    <img src="chart.png" alt="Фулл фото 1">
                </div>
            </div>

            <div class="interest-item-big clickable-pic">
                <div class="black-photo-box big-box">
                    <img src="chart (1).png" alt="Фулл фото 2">
                </div>
            </div>

        </section>

    </div>

    <div id="lightbox" class="lightbox">
        <img id="lightbox-img" src="" alt="Full view">
    </div>

    <script>
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const clickablePics = document.querySelectorAll('.clickable-pic img');

        clickablePics.forEach(img => {
            img.addEventListener('click', () => {
                lightboxImg.src = img.src;
                lightbox.classList.add('active');
            });
        });

        lightbox.addEventListener('click', () => {
            lightbox.classList.remove('active');
        });

        // Полная защита: блокирует правую кнопку мыши на всем сайте
        document.addEventListener('contextmenu', event => event.preventDefault());
    </script>

</body>
</html>
